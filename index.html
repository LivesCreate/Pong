<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pong" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Pong</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20180%20180'%3E%3Crect%20width='180'%20height='180'%20rx='40'%20fill='%23000'/%3E%3Cg%20fill='%23F5B942'%3E%3Crect%20x='54'%20y='40'%20width='72'%20height='12'%20rx='6'/%3E%3Crect%20x='54'%20y='128'%20width='72'%20height='12'%20rx='6'/%3E%3Ccircle%20cx='90'%20cy='90'%20r='12'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #000000;
    --surface: #0b0b0c;
    --surface-2: #141416;
    --surface-3: #1b1b1e;
    --hairline: rgba(255,255,255,0.07);
    --hairline-strong: rgba(255,255,255,0.12);
    --text: #f5f5f7;
    --text-dim: #98989f;
    --text-faint: #636367;
    --amber: #f5b942;
    --amber-dim: #b07d2a;
    --radius: 20px;
    --radius-sm: 13px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100vh; min-height: 100dvh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #root {
    min-height: 100vh; min-height: 100dvh;
    padding:
      calc(env(safe-area-inset-top) + 14px)
      calc(env(safe-area-inset-right) + 14px)
      calc(env(safe-area-inset-bottom) + 14px)
      calc(env(safe-area-inset-left) + 14px);
    display: flex; flex-direction: column;
  }
  .wrap { width: 100%; max-width: 480px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; }

  .bar { display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .title b { color: var(--amber); }
  .bar-right { display: flex; align-items: center; gap: 8px; }
  .tally { font-size: 12px; color: var(--text-faint); font-weight: 600; font-variant-numeric: tabular-nums; }
  .pill {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 999px; cursor: pointer;
    transition: transform 0.15s var(--ease);
  }
  .pill:active { transform: scale(0.95); }

  .court-wrap { position: relative; flex: 1; min-height: 0; display: flex; }
  .court {
    flex: 1; width: 100%; display: block; border-radius: var(--radius);
    background: #08090a; border: 1px solid var(--hairline); touch-action: none;
  }

  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 22px; text-align: center; overflow-y: auto;
    background: rgba(0,0,0,0.72); border-radius: var(--radius); backdrop-filter: blur(2px);
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .overlay::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .pause-settings {
    display: flex; flex-direction: column; gap: 6px; width: 200px;
    padding: 12px 14px; border: 1px solid var(--hairline); border-radius: 12px; background: var(--surface-2);
  }
  .ps-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .ps-k { font-size: 12px; color: var(--text-faint); }
  .ps-v { font-size: 13px; font-weight: 700; color: var(--amber); }
  .menu-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .mode-row { display: flex; gap: 8px; }
  .mode-tab {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 14px; font-weight: 600; padding: 9px 20px; border-radius: 999px; cursor: pointer;
    transition: transform 0.12s var(--ease), color 0.15s var(--ease), background 0.15s var(--ease);
  }
  .mode-tab:active { transform: scale(0.96); }
  .mode-tab.active { color: #000; background: var(--amber); border-color: var(--amber); }
  .pick-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin: 4px 0 0; }
  .menu-block.compact { gap: 7px; }
  .menu-block.compact .pick-label { margin: 2px 0 0; }
  .menu-block.compact .diff-btn { padding: 7px 11px; font-size: 12px; }
  .menu-block.compact .diff-row.wrap { max-width: min(370px, 94vw); gap: 6px; }
  .seg-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: min(330px, 86vw); margin-top: 3px; }
  .seg-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-faint); }
  .seg-btns { display: flex; border: 1px solid var(--hairline); border-radius: 999px; overflow: hidden; }
  .seg-btn { background: var(--surface-2); border: none; color: var(--text-dim); font-family: inherit; font-size: 12px; font-weight: 600; padding: 7px 13px; cursor: pointer; transition: background 0.14s var(--ease), color 0.14s var(--ease); }
  .seg-btn.active { background: var(--amber); color: #000; }
  .ov-title { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
  .ov-title.win { color: var(--amber); }
  .ov-sub { font-size: 14px; color: var(--text-dim); margin-top: -6px; }
  .diff-row { display: flex; gap: 8px; }
  .diff-row.wrap { flex-wrap: wrap; justify-content: center; max-width: 360px; }
  .diff-btn {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 9px 14px; border-radius: 999px; cursor: pointer;
    transition: transform 0.12s var(--ease), color 0.15s var(--ease), border-color 0.15s var(--ease);
  }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.active { color: #000; background: var(--amber); border-color: var(--amber); }
  .btn-primary {
    background: var(--amber); border: none; color: #000; font-family: inherit; font-size: 17px; font-weight: 700;
    padding: 15px 40px; border-radius: 14px; cursor: pointer; transition: transform 0.12s var(--ease);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 15px; font-weight: 600; padding: 12px 28px; border-radius: 14px; cursor: pointer;
  }
  .btn-ghost:active { transform: scale(0.97); }
  .hint { font-size: 12px; color: var(--text-faint); }
  .hint kbd { font-family: var(--mono); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 4px; padding: 1px 5px; font-size: 10px; }

  .ver-inline {
    display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.02em; color: var(--text-dim);
    margin-left: 8px; vertical-align: 3px; font-variant-numeric: tabular-nums;
    border: 1px solid var(--hairline); border-radius: 999px; padding: 2px 7px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function () {
  "use strict";
  var e = React.createElement;
  var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef;
  var VERSION = "1.6.2";

  var LS_DIFF = "pong_diff_v1";
  var LS_WTOP = "pong_wtop_v1";
  var LS_WBOT = "pong_wbot_v1";
  var LS_WUNCAP = "pong_wuncap_v1";
  var LS_WENDLESS = "pong_wendless_v1";
  var LS_WNOMISS = "pong_wnomiss_v1";
  var LS_STATS = "pong_stats_v1";

  // Flick / smash mechanic: swinging the paddle fast at contact transfers speed to the ball.
  //   FLICK_REF   = how fast you must move the paddle (in court-widths/sec) to max out a flick
  //   FLICK_SMASH = how much a full-speed EDGE flick multiplies ball speed (higher = punchier)
  var FLICK_REF = 5;
  var FLICK_SMASH = 1.1;

  // Keyboard (A/D, arrows): hold to move, accelerating smoothly the longer you hold.
  //   KEY_BASE = starting speed in court-widths/sec (low = precise taps)
  //   KEY_MAX  = top speed in court-widths/sec after holding
  //   KEY_RAMP = seconds of holding to reach top speed
  var KEY_BASE = 0.9;
  var KEY_MAX = 2.6;
  var KEY_RAMP = 2.0;

  // AI + ball tuning per difficulty. Knobs to mess with:
  //   speed   = AI paddle max travel, as a fraction of court height per second
  //   err     = aim error magnitude, as a fraction of court width
  //   blunder = chance per return the AI reads the WRONG spot and whiffs
  //   react   = reaction delay in seconds before it starts moving
  //   ball    = serve speed, as a fraction of court height per second
  // Extreme & Impossible drop the human pretense (no reaction, no error, no blunders).
  var DIFFS = {
    Easy:       { speed: 0.42, err: 0.10,  blunder: 0.18, react: 0.34, ball: 0.50 },
    Medium:     { speed: 0.58, err: 0.06,  blunder: 0.10, react: 0.22, ball: 0.58 },
    Hard:       { speed: 0.82, err: 0.03,  blunder: 0.05, react: 0.12, ball: 0.66 },
    Extreme:    { speed: 1.15, err: 0.015, blunder: 0.02, react: 0.05, ball: 0.74 },
    Impossible: { speed: 1.80, err: 0.00,  blunder: 0.00, react: 0.00, ball: 0.84 }
  };
  var DIFF_LIST = ["Easy", "Medium", "Hard", "Extreme", "Impossible"];

  // AI-vs-AI (spectate) tuning — these do NOT affect Player-vs-AI.
  // Capped: eases to ~4x serve speed and holds. Uncapped: climbs in stages with the
  // acceleration easing off each tier (fast to 4x, slower 4x->10x, slower still beyond),
  // and once very fast the ball starts slipping past the paddles to end the rally.
  var SPEC_MMAX = 4.0;        // capped mode plateau (x serve speed)
  var SPEC_RATE = 0.45;       // uncapped multiplier growth/sec in stage 1 (1x -> 4x)
  var SPEC_T2 = 10.0;         // uncapped stage-2 ceiling (4x -> 10x runs ~4x slower)
  var SPEC_CLIP = 9.0;        // above this multiplier, fast balls begin clipping through
  var SPEC_CEIL = 16.0;       // uncapped hard safety ceiling
  var SPEC_NOMISS_LOCK = 6.0; // "never miss": ball climbs then LOCKS here (below clip, so no goals)
  var NOMISS_VIS = 22;        // never-miss: how fast the VISIBLE paddle races to the spot (hitbox teleports)
  var FLAT_VX_FRAC = 0.08;    // |vx|/speed below this counts as "going straight up & down"
  var FLAT_LIMIT = 0.4;       // seconds of near-vertical travel before a random sideways nudge
  var SPEC_APPROACH = 1.2;    // how quickly current speed eases toward the target
  var HIT_MARGIN = 20;    // paddle hitbox expansion in px (registers a touch slightly early)
  var MISS_MIN = 10, MISS_MAX = 20; // seconds between forced AI whiffs
  var SCORE_PAUSE = 1.6;  // seconds the ball rests at center after a point
  var STALL_LIMIT = 150;  // seconds without a score before the match is called off
  var STALL_WARN = 60;    // start warning this long before the limit

  // Drive an AI paddle. `pad` carries its own config + state so two AIs can coexist.
  // Predict where the ball will cross a paddle's line (folding side-wall bounces in).
  function predictX(g, pad) {
    var b = g.ball;
    var planeY = pad.isTop ? (g.pad + g.ph + b.r) : (g.H - g.pad - g.ph - b.r);
    var toward = pad.isTop ? (b.vy < 0) : (b.vy > 0);
    if (!toward || b.vy === 0) return pad.x; // ball not coming — hold
    var t = (planeY - b.y) / b.vy;
    if (t < 0) return pad.x;
    var x = b.x + b.vx * t;
    var lo = b.r, hi = g.W - b.r, span = hi - lo;
    if (span <= 0) return pad.x;
    var rel = (((x - lo) % (2 * span)) + 2 * span) % (2 * span);
    return rel <= span ? lo + rel : lo + (2 * span - rel);
  }

  function driveAI(g, pad, dt) {
    var D = pad.cfg; if (!D) return;
    var heading0 = pad.isTop ? (g.ball.vy < 0) : (g.ball.vy > 0);
    if (g.noMiss) {
      // hitbox teleports to the predicted landing spot (never misses);
      // the drawn paddle just races there fast so it looks like motion.
      var tx = Math.max(pad.w / 2, Math.min(g.W - pad.w / 2, predictX(g, pad)));
      pad.x = tx;
      pad.vis += (tx - pad.vis) * Math.min(1, NOMISS_VIS * dt);
      return;
    }
    var heading = heading0;
    if (g.spectate) pad.missT -= dt; // countdown to the next forced whiff
    if (heading && !pad.appr) {
      var forceMiss = g.spectate && !g.uncap && pad.missT <= 0;
      if (forceMiss || Math.random() < D.blunder) {
        pad.blunder = true;
        pad.target = (g.ball.x < g.W / 2) ? g.W * 0.78 : g.W * 0.22;
        if (forceMiss) pad.missT = MISS_MIN + Math.random() * (MISS_MAX - MISS_MIN);
      } else {
        pad.blunder = false;
        pad.err = (Math.random() * 2 - 1) * D.err * g.W;
        // spectate: aim for varied contact points (sides) instead of always centering
        pad.aimOffset = g.spectate ? ((Math.random() < 0.35) ? 0 : (Math.random() * 2 - 1) * 0.7) : 0;
      }
      pad.reactT = D.react;
    }
    pad.appr = heading;
    if (heading) {
      if (pad.reactT > 0) { pad.reactT -= dt; }
      else {
        var target = pad.blunder ? pad.target : (g.ball.x - pad.aimOffset * (pad.w / 2) + pad.err);
        var maxMove = g.H * D.speed * dt;
        var dx = target - pad.x;
        if (Math.abs(dx) > 3) {
          if (Math.abs(dx) > maxMove) dx = (dx > 0 ? 1 : -1) * maxMove;
          pad.x += dx;
          pad.x = Math.min(Math.max(pad.w / 2, pad.x), g.W - pad.w / 2);
        }
      }
    }
  }

  function cornerBracket(ctx, x, y, sx, sy, L) {
    ctx.beginPath();
    ctx.moveTo(x + sx * L, y); ctx.lineTo(x, y); ctx.lineTo(x, y + sy * L);
    ctx.stroke();
  }

  // Lay out a (possibly huge) number as small monospace digits, wrapping left-to-right
  // then downward, confined to the rectangle [x0,y0]-[x1,y1]. If it overflows, the
  // digits that fit are shown with an ellipsis to signal it's still climbing off-screen.
  function drawScoreBlock(ctx, str, x0, y0, x1, y1, fs) {
    ctx.fillStyle = "rgba(245,185,66,0.18)";
    ctx.font = "700 " + fs + "px ui-monospace, Menlo, monospace";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    var charW = fs * 0.62, lineH = fs * 1.15;
    var cols = Math.max(1, Math.floor((x1 - x0) / charW));
    var rows = Math.max(1, Math.floor((y1 - y0) / lineH));
    var cap = cols * rows;
    var shown = str, trunc = false;
    if (str.length > cap) { shown = str.slice(0, Math.max(0, cap - 1)); trunc = true; }
    for (var i = 0; i < shown.length; i++) {
      var c = i % cols, r = Math.floor(i / cols);
      ctx.fillText(shown.charAt(i), x0 + c * charW, y0 + r * lineH);
    }
    if (trunc) {
      var c2 = shown.length % cols, r2 = Math.floor(shown.length / cols);
      ctx.fillText("\u2026", x0 + c2 * charW, y0 + r2 * lineH);
    }
  }

  function loadJSON(k, fb) { try { var r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch (e2) { return fb; } }
  function saveJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e2) {} }
  function buzz(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  // Set ball velocity from a desired (vx,vy) direction, normalized to `speed`,
  // while guaranteeing enough vertical motion that the ball always crosses the court.
  function applyVel(g, vx, vy, speed) {
    var minVy = speed * 0.40;
    if (Math.abs(vy) < minVy) vy = (vy < 0 ? -1 : 1) * minVy;
    var mag = Math.hypot(vx, vy) || 1;
    var s = speed / mag;
    g.ball.vx = vx * s; g.ball.vy = vy * s;
  }

  function Game() {
    var canvasRef = useRef(null);
    var G = useRef(null);
    var diffS = useState(function () { var d = loadJSON(LS_DIFF, "Medium"); return DIFFS[d] ? d : "Medium"; });
    var diff = diffS[0], setDiff = diffS[1];
    var topS = useState(function () { var d = loadJSON(LS_WTOP, "Hard"); return DIFFS[d] ? d : "Hard"; });
    var diffTop = topS[0], setDiffTop = topS[1];
    var botS = useState(function () { var d = loadJSON(LS_WBOT, "Easy"); return DIFFS[d] ? d : "Easy"; });
    var diffBottom = botS[0], setDiffBottom = botS[1];
    var uncapS = useState(function () { return loadJSON(LS_WUNCAP, false) === true; });
    var uncap = uncapS[0], setUncap = uncapS[1];
    var endlessS = useState(function () { return loadJSON(LS_WENDLESS, false) === true; });
    var endless = endlessS[0], setEndless = endlessS[1];
    var aiModeS = useState(function () { return loadJSON(LS_WNOMISS, false) === true ? "nomiss" : "normal"; });
    var aiMode = aiModeS[0], setAiMode = aiModeS[1];
    var mmS = useState("play"); var menuMode = mmS[0], setMenuMode = mmS[1];
    var statsS = useState(function () { return loadJSON(LS_STATS, { wins: 0, losses: 0 }); });
    var stats = statsS[0], setStats = statsS[1];
    var modeS = useState("menu"); var mode = modeS[0], setMode = modeS[1]; // menu | playing | paused | over
    var pS = useState(0); var pScore = pS[0], setPScore = pS[1];
    var aS = useState(0); var aScore = aS[0], setAScore = aS[1];
    var resultS = useState(""); var result = resultS[0], setResult = resultS[1];

    var diffRef = useRef(diff); diffRef.current = diff;
    var topRef = useRef(diffTop); topRef.current = diffTop;
    var botRef = useRef(diffBottom); botRef.current = diffBottom;
    var uncapRef = useRef(uncap); uncapRef.current = uncap;
    var endlessRef = useRef(endless); endlessRef.current = endless;
    var aiModeRef = useRef(aiMode); aiModeRef.current = aiMode;
    var menuModeRef = useRef(menuMode); menuModeRef.current = menuMode;
    var modeRef = useRef(mode); modeRef.current = mode;

    // ---- init game state object ----
    function ensureG() {
      if (!G.current) {
        G.current = {
          W: 300, H: 460,
          player: { x: 150, w: 70, prevX: 150, vxS: 0, vis: 150, isTop: false, isAI: false, cfg: null, err: 0, appr: false, blunder: false, target: 150, reactT: 0, missT: 15, aimOffset: 0 },
          ai:     { x: 150, w: 70, prevX: 150, vxS: 0, vis: 150, isTop: true,  isAI: true,  cfg: null, err: 0, appr: false, blunder: false, target: 150, reactT: 0, missT: 15, aimOffset: 0 },
          ball: { x: 150, y: 230, vx: 0, vy: 0, r: 7 },
          trail: [],
          ph: 11, pad: 18, serveT: 0,
          keyL: false, keyR: false, keyHoldT: 0,
          spectate: false, target: 7, ballFrac: 0.58, elapsed: 0, blink: 0, topLabel: "", bottomLabel: "",
          uncap: false, rallyT: 0, sinceScore: 0, scoredBy: "", endless: false, specM: 1, noMiss: false, flatT: 0
        };
      }
      return G.current;
    }

    function dims() { var g = ensureG(); return { W: g.W, H: g.H }; }

    function placePaddles() {
      var g = ensureG();
      g.player.w = Math.max(48, g.W * 0.22);
      g.ai.w = g.player.w;
      g.ball.r = Math.max(5, g.W * 0.022);
      g.ph = Math.max(8, g.H * 0.016);
      g.pad = g.H * 0.05;
    }

    function serve(towardPlayer) {
      var g = ensureG();
      g.ball.x = g.W / 2; g.ball.y = g.H / 2;
      var spd = g.H * g.ballFrac;
      var ang = (Math.random() * 0.5 - 0.25); // small horizontal spread
      g.ball.vx = Math.sin(ang) * spd;
      g.ball.vy = (towardPlayer ? 1 : -1) * Math.cos(ang) * spd;
      g.serveT = (g.spectate ? SCORE_PAUSE : 0.7); // longer hold at center in spectate
      g.rallyT = 0; g.specM = 1; g.flatT = 0;
      g.player.appr = false; g.player.reactT = 0; g.player.blunder = false;
      g.ai.appr = false; g.ai.reactT = 0; g.ai.blunder = false;
      g.trail = [];
      g.player.prevX = g.player.x; g.player.vxS = 0;
      g.ai.prevX = g.ai.x; g.ai.vxS = 0;
      g.player.vis = g.player.x; g.ai.vis = g.ai.x;
    }

    function newGame() {
      var g = ensureG(); placePaddles();
      g.player.x = g.W / 2; g.ai.x = g.W / 2;
      g.player.prevX = g.W / 2; g.ai.prevX = g.W / 2;
      g.player.vis = g.W / 2; g.ai.vis = g.W / 2;
      g.player.vxS = 0; g.ai.vxS = 0; g.trail = [];
      g.keyL = false; g.keyR = false; g.keyHoldT = 0;
      g.player.appr = false; g.ai.appr = false;
      g.player.reactT = 0; g.ai.reactT = 0;
      g.player.blunder = false; g.ai.blunder = false;
      g.elapsed = 0; g.blink = 0; g.rallyT = 0; g.sinceScore = 0; g.scoredBy = "";

                { txt: "To 10", on: !endless, onClick: function () { setEndless(false); saveJSON(LS_WENDLESS, false); } },
                { txt: "Endless", on: endless, onClick: function () { setEndless(true); saveJSON(LS_WENDLESS, true); } }
              ]),
              seg("AI", [
                { txt: "Normal", on: aiMode === "normal", onClick: function () { setAiMode("normal"); saveJSON(LS_WNOMISS, false); } },
                { txt: "Never miss", on: aiMode === "nomiss", onClick: function () { setAiMode("nomiss"); saveJSON(LS_WNOMISS, true); } }
              ])),
        e("button", { className: "btn-primary", onClick: newGame }, menuMode === "play" ? "Play" : "Watch"),
        menuMode === "play"
          ? e("div", { className: "hint" }, "Drag to move \u00B7 ", e("kbd", null, "\u2190\u2192"), " / ", e("kbd", null, "A D"), " \u00B7 ", e("kbd", null, "Space"), " pause")
          : e("div", { className: "hint" }, aiMode === "nomiss" ? "Never miss \u2014 endless perfect rally" : "Sit back \u2014 it plays itself")
      );
    } else if (mode === "paused") {
      overlay = e("div", { className: "overlay" },
        e("div", { className: "ov-title" }, "Paused"),
        (spec && G.current) ? e("div", { className: "pause-settings" },
          e("div", { className: "ps-row" }, e("span", { className: "ps-k" }, "Ball speed"), e("span", { className: "ps-v" }, G.current.uncap ? "Uncapped" : "Capped")),
          e("div", { className: "ps-row" }, e("span", { className: "ps-k" }, "Match"), e("span", { className: "ps-v" }, G.current.endless ? "Endless" : "First to 10")),
          e("div", { className: "ps-row" }, e("span", { className: "ps-k" }, "AI"), e("span", { className: "ps-v" }, G.current.noMiss ? "Never miss" : "Normal"))
        ) : null,
        e("button", { className: "btn-primary", onClick: function () { setMode("playing"); } }, "Resume"),
        e("button", { className: "btn-ghost", onClick: function () { setMode("menu"); } }, "Quit to menu")
      );
    } else if (mode === "over") {
      var title, sub;
      if (spec) {
        if (result === "stall") {
          title = "Match called off";
          sub = "AIs stalled \u2014 no result \u00B7 " + aScore + " \u2013 " + pScore;
        } else {
          title = (result === "top" ? "Top wins" : "Bottom wins");
          sub = aScore + " \u2013 " + pScore + " \u00B7 " + G.current.topLabel + " vs " + G.current.bottomLabel;
        }
      } else {
        title = result === "win" ? "You win" : "You lose";
        sub = pScore + " \u2013 " + aScore + " \u00B7 " + diff;
      }
      overlay = e("div", { className: "overlay" },
        e("div", { className: "ov-title" + ((spec && result !== "stall") || result === "win" ? " win" : "") }, title),
        e("div", { className: "ov-sub" }, sub),
        e("button", { className: "btn-primary", onClick: newGame }, spec ? "Watch again" : "Play again"),
        e("button", { className: "btn-ghost", onClick: function () { setMode("menu"); } }, "Menu")
      );
    }

    return e("div", { className: "wrap" },
      e("div", { className: "bar" },
        e("h1", { className: "title" }, "Pong", e("b", null, "."), e("span", { className: "ver-inline" }, "v" + VERSION)),
        e("div", { className: "bar-right" },
          (spec && mode !== "menu")
            ? e("span", { className: "tally" }, "AI vs AI")
            : e("span", { className: "tally" }, "W " + stats.wins + " \u00B7 L " + stats.losses),
          mode === "playing" ? e("button", { className: "pill", onClick: function () { setMode("paused"); } }, "Pause") : null
        )
      ),
      e("div", { className: "court-wrap" },
        e("canvas", { ref: canvasRef, className: "court" }),
        overlay
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(Game));

  if ("serviceWorker" in navigator) {
    var refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (refreshing) return; refreshing = true; window.location.reload();
    });
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").then(function (reg) { reg.update(); }).catch(function () {});
    });
  }
})();
</script>
</body>
</html>
