<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pong" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Pong</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20180%20180'%3E%3Crect%20width='180'%20height='180'%20rx='40'%20fill='%23000'/%3E%3Cg%20fill='%23F5B942'%3E%3Crect%20x='54'%20y='40'%20width='72'%20height='12'%20rx='6'/%3E%3Crect%20x='54'%20y='128'%20width='72'%20height='12'%20rx='6'/%3E%3Ccircle%20cx='90'%20cy='90'%20r='12'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #000000;
    --surface: #0b0b0c;
    --surface-2: #141416;
    --surface-3: #1b1b1e;
    --hairline: rgba(255,255,255,0.07);
    --hairline-strong: rgba(255,255,255,0.12);
    --text: #f5f5f7;
    --text-dim: #98989f;
    --text-faint: #636367;
    --amber: #f5b942;
    --amber-dim: #b07d2a;
    --radius: 20px;
    --radius-sm: 13px;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100vh; min-height: 100dvh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #root {
    min-height: 100vh; min-height: 100dvh;
    padding:
      calc(env(safe-area-inset-top) + 14px)
      calc(env(safe-area-inset-right) + 14px)
      calc(env(safe-area-inset-bottom) + 14px)
      calc(env(safe-area-inset-left) + 14px);
    display: flex; flex-direction: column;
  }
  .wrap { width: 100%; max-width: 480px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; }

  .bar { display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .title b { color: var(--amber); }
  .bar-right { display: flex; align-items: center; gap: 8px; }
  .tally { font-size: 12px; color: var(--text-faint); font-weight: 600; font-variant-numeric: tabular-nums; }
  .pill {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 999px; cursor: pointer;
    transition: transform 0.15s var(--ease);
  }
  .pill:active { transform: scale(0.95); }

  .court-wrap { position: relative; flex: 1; min-height: 0; display: flex; }
  .court {
    flex: 1; width: 100%; display: block; border-radius: var(--radius);
    background: #08090a; border: 1px solid var(--hairline); touch-action: none;
  }

  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 22px; text-align: center; overflow-y: auto;
    background: rgba(0,0,0,0.72); border-radius: var(--radius); backdrop-filter: blur(2px);
  }
  .menu-block { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .mode-row { display: flex; gap: 8px; }
  .mode-tab {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 14px; font-weight: 600; padding: 9px 20px; border-radius: 999px; cursor: pointer;
    transition: transform 0.12s var(--ease), color 0.15s var(--ease), background 0.15s var(--ease);
  }
  .mode-tab:active { transform: scale(0.96); }
  .mode-tab.active { color: #000; background: var(--amber); border-color: var(--amber); }
  .pick-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin: 4px 0 0; }
  .ov-title { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
  .ov-title.win { color: var(--amber); }
  .ov-sub { font-size: 14px; color: var(--text-dim); margin-top: -6px; }
  .diff-row { display: flex; gap: 8px; }
  .diff-row.wrap { flex-wrap: wrap; justify-content: center; max-width: 360px; }
  .diff-btn {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 9px 14px; border-radius: 999px; cursor: pointer;
    transition: transform 0.12s var(--ease), color 0.15s var(--ease), border-color 0.15s var(--ease);
  }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.active { color: #000; background: var(--amber); border-color: var(--amber); }
  .btn-primary {
    background: var(--amber); border: none; color: #000; font-family: inherit; font-size: 17px; font-weight: 700;
    padding: 15px 40px; border-radius: 14px; cursor: pointer; transition: transform 0.12s var(--ease);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost {
    background: var(--surface-2); border: 1px solid var(--hairline); color: var(--text-dim);
    font-family: inherit; font-size: 15px; font-weight: 600; padding: 12px 28px; border-radius: 14px; cursor: pointer;
  }
  .btn-ghost:active { transform: scale(0.97); }
  .hint { font-size: 12px; color: var(--text-faint); }
  .hint kbd { font-family: var(--mono); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 4px; padding: 1px 5px; font-size: 10px; }

  .ver-badge {
    position: fixed; bottom: calc(env(safe-area-inset-bottom) + 16px); right: calc(env(safe-area-inset-right) + 16px);
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-dim);
    background: var(--surface-2); border: 1px solid var(--hairline); padding: 4px 9px; border-radius: 999px;
    font-variant-numeric: tabular-nums; z-index: 30; pointer-events: none;
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function () {
  "use strict";
  var e = React.createElement;
  var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef;
  var VERSION = "1.2.0";

  var LS_DIFF = "pong_diff_v1";
  var LS_WTOP = "pong_wtop_v1";
  var LS_WBOT = "pong_wbot_v1";
  var LS_STATS = "pong_stats_v1";

  // Flick / smash mechanic: swinging the paddle fast at contact transfers speed to the ball.
  //   FLICK_REF   = how fast you must move the paddle (in court-widths/sec) to max out a flick
  //   FLICK_SMASH = how much a full-speed EDGE flick multiplies ball speed (higher = punchier)
  var FLICK_REF = 5;
  var FLICK_SMASH = 1.1;

  // Keyboard (A/D, arrows): hold to move, accelerating smoothly the longer you hold.
  //   KEY_BASE = starting speed in court-widths/sec (low = precise taps)
  //   KEY_MAX  = top speed in court-widths/sec after holding
  //   KEY_RAMP = seconds of holding to reach top speed
  var KEY_BASE = 0.9;
  var KEY_MAX = 2.6;
  var KEY_RAMP = 2.0;

  // AI + ball tuning per difficulty. Knobs to mess with:
  //   speed   = AI paddle max travel, as a fraction of court height per second
  //   err     = aim error magnitude, as a fraction of court width
  //   blunder = chance per return the AI reads the WRONG spot and whiffs
  //   react   = reaction delay in seconds before it starts moving
  //   ball    = serve speed, as a fraction of court height per second
  // Extreme & Impossible drop the human pretense (no reaction, no error, no blunders).
  var DIFFS = {
    Easy:       { speed: 0.42, err: 0.10,  blunder: 0.18, react: 0.34, ball: 0.50 },
    Medium:     { speed: 0.58, err: 0.06,  blunder: 0.10, react: 0.22, ball: 0.58 },
    Hard:       { speed: 0.82, err: 0.03,  blunder: 0.05, react: 0.12, ball: 0.66 },
    Extreme:    { speed: 1.15, err: 0.015, blunder: 0.02, react: 0.05, ball: 0.74 },
    Impossible: { speed: 1.80, err: 0.00,  blunder: 0.00, react: 0.00, ball: 0.84 }
  };
  var DIFF_LIST = ["Easy", "Medium", "Hard", "Extreme", "Impossible"];

  // Drive an AI paddle. `pad` carries its own config + state so two AIs can coexist.
  function driveAI(g, pad, dt) {
    var D = pad.cfg; if (!D) return;
    var heading = pad.isTop ? (g.ball.vy < 0) : (g.ball.vy > 0);
    if (heading && !pad.appr) {
      if (Math.random() < D.blunder) {
        pad.blunder = true;
        pad.target = (g.ball.x < g.W / 2) ? g.W * 0.74 : g.W * 0.26;
      } else {
        pad.blunder = false;
        pad.err = (Math.random() * 2 - 1) * D.err * g.W;
      }
      pad.reactT = D.react;
    }
    pad.appr = heading;
    if (heading) {
      if (pad.reactT > 0) { pad.reactT -= dt; }
      else {
        var target = pad.blunder ? pad.target : (g.ball.x + pad.err);
        var maxMove = g.H * D.speed * dt;
        var dx = target - pad.x;
        if (Math.abs(dx) > 3) {
          if (Math.abs(dx) > maxMove) dx = (dx > 0 ? 1 : -1) * maxMove;
          pad.x += dx;
          pad.x = Math.min(Math.max(pad.w / 2, pad.x), g.W - pad.w / 2);
        }
      }
    }
  }

  function cornerBracket(ctx, x, y, sx, sy, L) {
    ctx.beginPath();
    ctx.moveTo(x + sx * L, y); ctx.lineTo(x, y); ctx.lineTo(x, y + sy * L);
    ctx.stroke();
  }

  function loadJSON(k, fb) { try { var r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch (e2) { return fb; } }
  function saveJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e2) {} }
  function buzz(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  // Set ball velocity from a desired (vx,vy) direction, normalized to `speed`,
  // while guaranteeing enough vertical motion that the ball always crosses the court.
  function applyVel(g, vx, vy, speed) {
    var minVy = speed * 0.40;
    if (Math.abs(vy) < minVy) vy = (vy < 0 ? -1 : 1) * minVy;
    var mag = Math.hypot(vx, vy) || 1;
    var s = speed / mag;
    g.ball.vx = vx * s; g.ball.vy = vy * s;
  }

  function Game() {
    var canvasRef = useRef(null);
    var G = useRef(null);
    var diffS = useState(function () { var d = loadJSON(LS_DIFF, "Medium"); return DIFFS[d] ? d : "Medium"; });
    var diff = diffS[0], setDiff = diffS[1];
    var topS = useState(function () { var d = loadJSON(LS_WTOP, "Hard"); return DIFFS[d] ? d : "Hard"; });
    var diffTop = topS[0], setDiffTop = topS[1];
    var botS = useState(function () { var d = loadJSON(LS_WBOT, "Easy"); return DIFFS[d] ? d : "Easy"; });
    var diffBottom = botS[0], setDiffBottom = botS[1];
    var mmS = useState("play"); var menuMode = mmS[0], setMenuMode = mmS[1];
    var statsS = useState(function () { return loadJSON(LS_STATS, { wins: 0, losses: 0 }); });
    var stats = statsS[0], setStats = statsS[1];
    var modeS = useState("menu"); var mode = modeS[0], setMode = modeS[1]; // menu | playing | paused | over
    var pS = useState(0); var pScore = pS[0], setPScore = pS[1];
    var aS = useState(0); var aScore = aS[0], setAScore = aS[1];
    var resultS = useState(""); var result = resultS[0], setResult = resultS[1];

    var diffRef = useRef(diff); diffRef.current = diff;
    var topRef = useRef(diffTop); topRef.current = diffTop;
    var botRef = useRef(diffBottom); botRef.current = diffBottom;
    var menuModeRef = useRef(menuMode); menuModeRef.current = menuMode;
    var modeRef = useRef(mode); modeRef.current = mode;

    // ---- init game state object ----
    function ensureG() {
      if (!G.current) {
        G.current = {
          W: 300, H: 460,
          player: { x: 150, w: 70, prevX: 150, vxS: 0, isTop: false, isAI: false, cfg: null, err: 0, appr: false, blunder: false, target: 150, reactT: 0 },
          ai:     { x: 150, w: 70, prevX: 150, vxS: 0, isTop: true,  isAI: true,  cfg: null, err: 0, appr: false, blunder: false, target: 150, reactT: 0 },
          ball: { x: 150, y: 230, vx: 0, vy: 0, r: 7 },
          trail: [],
          ph: 11, pad: 18, serveT: 0,
          keyL: false, keyR: false, keyHoldT: 0,
          spectate: false, target: 7, ballFrac: 0.58, elapsed: 0, blink: 0, topLabel: "", bottomLabel: ""
        };
      }
      return G.current;
    }

    function dims() { var g = ensureG(); return { W: g.W, H: g.H }; }

    function placePaddles() {
      var g = ensureG();
      g.player.w = Math.max(48, g.W * 0.22);
      g.ai.w = g.player.w;
      g.ball.r = Math.max(5, g.W * 0.022);
      g.ph = Math.max(8, g.H * 0.016);
      g.pad = g.H * 0.05;
    }

    function serve(towardPlayer) {
      var g = ensureG();
      g.ball.x = g.W / 2; g.ball.y = g.H / 2;
      var spd = g.H * g.ballFrac;
      var ang = (Math.random() * 0.5 - 0.25); // small horizontal spread
      g.ball.vx = Math.sin(ang) * spd;
      g.ball.vy = (towardPlayer ? 1 : -1) * Math.cos(ang) * spd;
      g.serveT = 0.7; // brief pause before it moves
      g.player.appr = false; g.player.reactT = 0; g.player.blunder = false;
      g.ai.appr = false; g.ai.reactT = 0; g.ai.blunder = false;
      g.trail = [];
      g.player.prevX = g.player.x; g.player.vxS = 0;
      g.ai.prevX = g.ai.x; g.ai.vxS = 0;
    }

    function newGame() {
      var g = ensureG(); placePaddles();
      g.player.x = g.W / 2; g.ai.x = g.W / 2;
      g.player.prevX = g.W / 2; g.ai.prevX = g.W / 2;
      g.player.vxS = 0; g.ai.vxS = 0; g.trail = [];
      g.keyL = false; g.keyR = false; g.keyHoldT = 0;
      g.player.appr = false; g.ai.appr = false;
      g.player.reactT = 0; g.ai.reactT = 0;
      g.player.blunder = false; g.ai.blunder = false;
      g.elapsed = 0; g.blink = 0;
      if (menuModeRef.current === "watch") {
        g.spectate = true;
        g.ai.cfg = DIFFS[topRef.current]; g.ai.isAI = true;
        g.player.cfg = DIFFS[botRef.current]; g.player.isAI = true;
        g.topLabel = topRef.current; g.bottomLabel = botRef.current;
        g.target = 10;
        g.ballFrac = Math.max(DIFFS[topRef.current].ball, DIFFS[botRef.current].ball);
      } else {
        g.spectate = false;
        g.ai.cfg = DIFFS[diffRef.current]; g.ai.isAI = true;
        g.player.cfg = null; g.player.isAI = false;
        g.topLabel = diffRef.current; g.bottomLabel = "You";
        g.target = 7;
        g.ballFrac = DIFFS[diffRef.current].ball;
      }
      setPScore(0); setAScore(0);
      serve(Math.random() < 0.5);
      setMode("playing");
    }

    // ---- sizing ----
    useEffect(function () {
      var canvas = canvasRef.current;
      function resize() {
        var g = ensureG();
        var w = canvas.clientWidth, h = canvas.clientHeight;
        var dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
        canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
        var ctx = canvas.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        g.W = w; g.H = h; placePaddles();
        g.player.x = Math.min(Math.max(g.player.w / 2, g.player.x), w - g.player.w / 2);
        g.ai.x = Math.min(Math.max(g.ai.w / 2, g.ai.x), w - g.ai.w / 2);
        g.player.prevX = g.player.x; g.ai.prevX = g.ai.x;
        draw();
      }
      resize();
      window.addEventListener("resize", resize);
      return function () { window.removeEventListener("resize", resize); };
    }, []);

    // ---- input ----
    useEffect(function () {
      var canvas = canvasRef.current;
      function moveTo(clientX) {
        var g = ensureG();
        var rect = canvas.getBoundingClientRect();
        var x = clientX - rect.left;
        g.player.x = Math.min(Math.max(g.player.w / 2, x), g.W - g.player.w / 2);
      }
      function onPointer(ev) {
        if (modeRef.current !== "playing") return;
        var g = ensureG(); if (g.player.isAI) return; // spectating: no control
        if (ev.touches && ev.touches.length) moveTo(ev.touches[0].clientX);
        else moveTo(ev.clientX);
        ev.preventDefault();
      }
      function onKeyDown(ev) {
        var g = ensureG();
        var k = ev.key;
        if (k === "ArrowLeft" || k === "a" || k === "A") {
          ev.preventDefault();
          if (!g.keyL) { g.keyL = true; if (!g.keyR) g.keyHoldT = 0; }
        } else if (k === "ArrowRight" || k === "d" || k === "D") {
          ev.preventDefault();
          if (!g.keyR) { g.keyR = true; if (!g.keyL) g.keyHoldT = 0; }
        } else if (k === " " || ev.code === "Space") {
          ev.preventDefault();
          if (modeRef.current === "playing") setMode("paused");
          else if (modeRef.current === "paused") setMode("playing");
        }
      }
      function onKeyUp(ev) {
        var g = ensureG();
        var k = ev.key;
        if (k === "ArrowLeft" || k === "a" || k === "A") g.keyL = false;
        else if (k === "ArrowRight" || k === "d" || k === "D") g.keyR = false;
      }
      canvas.addEventListener("mousemove", onPointer);
      canvas.addEventListener("touchmove", onPointer, { passive: false });
      canvas.addEventListener("touchstart", onPointer, { passive: false });
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      return function () {
        canvas.removeEventListener("mousemove", onPointer);
        canvas.removeEventListener("touchmove", onPointer);
        canvas.removeEventListener("touchstart", onPointer);
        window.removeEventListener("keydown", onKeyDown);
        window.removeEventListener("keyup", onKeyUp);
      };
    }, []);

    // ---- draw ----
    function draw() {
      var g = ensureG();
      var canvas = canvasRef.current; if (!canvas) return;
      var ctx = canvas.getContext("2d");
      var W = g.W, H = g.H;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#08090a"; ctx.fillRect(0, 0, W, H);
      // center dashed line
      ctx.strokeStyle = "rgba(245,185,66,0.18)"; ctx.lineWidth = 2;
      ctx.setLineDash([8, 10]); ctx.beginPath();
      ctx.moveTo(14, H / 2); ctx.lineTo(W - 14, H / 2); ctx.stroke(); ctx.setLineDash([]);
      // scores (faint, in each half)
      ctx.fillStyle = "rgba(245,185,66,0.10)";
      ctx.font = "700 " + (H * 0.14).toFixed(0) + "px " + "-apple-system, system-ui, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(String(aScoreRef.current), W / 2, H * 0.28);
      ctx.fillText(String(pScoreRef.current), W / 2, H * 0.72);
      // paddles
      ctx.fillStyle = "#f5b942";
      rr(ctx, g.ai.x - g.ai.w / 2, g.pad, g.ai.w, g.ph, g.ph / 2);
      rr(ctx, g.player.x - g.player.w / 2, H - g.pad - g.ph, g.player.w, g.ph, g.ph / 2);
      // ball trail (reads speed on smashes)
      var tr = g.trail || [];
      for (var ti = 0; ti < tr.length; ti++) {
        var a = (ti + 1) / tr.length;
        ctx.globalAlpha = a * 0.22;
        ctx.beginPath(); ctx.arc(tr[ti].x, tr[ti].y, g.ball.r * (0.45 + 0.55 * a), 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      // ball
      ctx.beginPath(); ctx.arc(g.ball.x, g.ball.y, g.ball.r, 0, Math.PI * 2); ctx.fill();

      // spectator broadcast overlay (camera-feed framing)
      if (g.spectate) {
        ctx.strokeStyle = "rgba(245,185,66,0.55)"; ctx.lineWidth = 2;
        var m = 12, L = 20;
        cornerBracket(ctx, m, m, 1, 1, L);
        cornerBracket(ctx, W - m, m, -1, 1, L);
        cornerBracket(ctx, m, H - m, 1, -1, L);
        cornerBracket(ctx, W - m, H - m, -1, -1, L);
        ctx.textBaseline = "middle";
        // LIVE with blinking dot (top-left)
        var lit = (Math.floor(g.blink * 1.4) % 2) === 0;
        if (lit) { ctx.fillStyle = "#e0564b"; ctx.beginPath(); ctx.arc(m + 12, m + 22, 4, 0, Math.PI * 2); ctx.fill(); }
        ctx.fillStyle = "rgba(245,245,247,0.82)";
        ctx.font = "700 12px ui-monospace, Menlo, monospace";
        ctx.textAlign = "left"; ctx.fillText("LIVE", m + 22, m + 22);
        // REC timer (top-right)
        var sec = Math.floor(g.elapsed), mm = Math.floor(sec / 60), ss = sec % 60;
        ctx.textAlign = "right"; ctx.fillStyle = "rgba(245,245,247,0.6)";
        ctx.fillText("REC " + mm + ":" + (ss < 10 ? "0" : "") + ss, W - m - 6, m + 22);
        // side difficulty labels
        ctx.textAlign = "center"; ctx.fillStyle = "rgba(245,185,66,0.5)";
        ctx.font = "700 11px ui-monospace, Menlo, monospace";
        ctx.fillText(g.topLabel.toUpperCase(), W / 2, g.pad + g.ph + 18);
        ctx.fillText(g.bottomLabel.toUpperCase(), W / 2, H - g.pad - g.ph - 18);
      }
    }
    function rr(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); ctx.fill();
    }

    var pScoreRef = useRef(0); pScoreRef.current = pScore;
    var aScoreRef = useRef(0); aScoreRef.current = aScore;

    // ---- main loop (runs only while playing) ----
    useEffect(function () {
      if (mode !== "playing") { draw(); return; }
      var raf = 0, lastT = 0;
      function step(t) {
        raf = requestAnimationFrame(step);
        if (!lastT) { lastT = t; return; }
        var dt = Math.min(1 / 30, (t - lastT) / 1000); lastT = t;
        var g = ensureG();

        // measure paddle swing speed (for flick/smash) — both paddles
        var pvx = (g.player.x - g.player.prevX) / (dt || 0.016);
        g.player.vxS = g.player.vxS * 0.5 + pvx * 0.5;
        g.player.prevX = g.player.x;
        var avx = (g.ai.x - g.ai.prevX) / (dt || 0.016);
        g.ai.vxS = g.ai.vxS * 0.5 + avx * 0.5;
        g.ai.prevX = g.ai.x;

        // keyboard hold-to-move (human only): continuous, accelerating the longer a key is held
        if (!g.player.isAI) {
          var kdir = (g.keyL && !g.keyR) ? -1 : ((g.keyR && !g.keyL) ? 1 : 0);
          if (kdir !== 0) {
            g.keyHoldT += dt;
            var ramp = Math.min(1, g.keyHoldT / KEY_RAMP);
            var kspeed = (KEY_BASE + (KEY_MAX - KEY_BASE) * ramp) * g.W;
            g.player.x += kdir * kspeed * dt;
            g.player.x = Math.min(Math.max(g.player.w / 2, g.player.x), g.W - g.player.w / 2);
          } else {
            g.keyHoldT = 0;
          }
        }

        // drive the AI paddle(s): top is always AI; bottom too when spectating
        driveAI(g, g.ai, dt);
        if (g.player.isAI) driveAI(g, g.player, dt);
        if (g.spectate) { g.elapsed += dt; g.blink += dt; }

        if (g.serveT > 0) { g.serveT -= dt; draw(); return; }

        // move ball
        g.ball.x += g.ball.vx * dt;
        g.ball.y += g.ball.vy * dt;

        // side walls
        if (g.ball.x - g.ball.r < 0) { g.ball.x = g.ball.r; g.ball.vx = Math.abs(g.ball.vx); }
        if (g.ball.x + g.ball.r > g.W) { g.ball.x = g.W - g.ball.r; g.ball.vx = -Math.abs(g.ball.vx); }

        // player paddle (bottom)
        var pyTop = g.H - g.pad - g.ph;
        if (g.ball.vy > 0 && g.ball.y + g.ball.r >= pyTop && g.ball.y + g.ball.r <= pyTop + g.ph + 14) {
          if (g.ball.x >= g.player.x - g.player.w / 2 - g.ball.r && g.ball.x <= g.player.x + g.player.w / 2 + g.ball.r) {
            g.ball.y = pyTop - g.ball.r;
            bounce(g, g.player.x, g.player.w / 2, g.player.vxS);
          }
        }
        // AI paddle (top)
        var ayBot = g.pad + g.ph;
        if (g.ball.vy < 0 && g.ball.y - g.ball.r <= ayBot && g.ball.y - g.ball.r >= g.pad - 14) {
          if (g.ball.x >= g.ai.x - g.ai.w / 2 - g.ball.r && g.ball.x <= g.ai.x + g.ai.w / 2 + g.ball.r) {
            g.ball.y = ayBot + g.ball.r;
            bounce(g, g.ai.x, g.ai.w / 2, g.spectate ? g.ai.vxS : 0);
          }
        }

        // scoring
        g.trail.push({ x: g.ball.x, y: g.ball.y });
        if (g.trail.length > 7) g.trail.shift();
        if (g.ball.y - g.ball.r > g.H) { point(false); return; }
        if (g.ball.y + g.ball.r < 0) { point(true); return; }

        draw();
      }

      function bounce(g, center, halfW, paddleVx) {
        var prevSpeed = Math.hypot(g.ball.vx, g.ball.vy);
        var speed = Math.min(prevSpeed * 1.05, g.H * 1.3); // normal rally speed-up
        var offset = (g.ball.x - center) / halfW;
        offset = Math.max(-1, Math.min(1, offset));
        var edgeFrac = Math.abs(offset);

        // FLICK / SMASH: paddle motion at contact transfers speed + direction to the ball.
        var speedFrac = Math.min(1, Math.abs(paddleVx) / (g.W * FLICK_REF));
        var smash = 1 + speedFrac * (0.35 + 0.65 * edgeFrac) * FLICK_SMASH; // edge + fast = biggest
        speed = Math.min(speed * smash, g.H * 2.4); // higher cap so smashes can really fly

        var vy = -g.ball.vy;
        var vx = g.ball.vx * 0.35 + offset * speed * 0.85 + paddleVx * 0.25; // english + flick direction
        applyVel(g, vx, vy, speed);
        buzz(smash > 1.4 ? 26 : 10); // meatier thump on a real smash
      }

      function point(bottomScored) {
        var g = ensureG();
        if (bottomScored) {
          var np = pScoreRef.current + 1; setPScore(np);
          if (np >= g.target) return finish(true);
          serve(false);
        } else {
          var na = aScoreRef.current + 1; setAScore(na);
          if (na >= g.target) return finish(false);
          serve(true);
        }
        buzz(18);
      }

      function finish(bottomWon) {
        var g = ensureG();
        if (g.spectate) {
          setResult(bottomWon ? "bottom" : "top");
        } else {
          setResult(bottomWon ? "win" : "lose");
          setStats(function (s) {
            var ns = { wins: s.wins + (bottomWon ? 1 : 0), losses: s.losses + (bottomWon ? 0 : 1) };
            saveJSON(LS_STATS, ns); return ns;
          });
        }
        buzz(bottomWon ? 40 : 24);
        setMode("over");
      }

      raf = requestAnimationFrame(step);
      return function () { cancelAnimationFrame(raf); };
    }, [mode]);

    function chooseDiff(d) { setDiff(d); saveJSON(LS_DIFF, d); }
    function chooseTop(d) { setDiffTop(d); saveJSON(LS_WTOP, d); }
    function chooseBottom(d) { setDiffBottom(d); saveJSON(LS_WBOT, d); }

    function pills(sel, onPick) {
      return e("div", { className: "diff-row wrap" },
        DIFF_LIST.map(function (d) {
          return e("button", { key: d, className: "diff-btn" + (sel === d ? " active" : ""), onClick: function () { onPick(d); } }, d);
        })
      );
    }

    // ---- overlays ----
    var spec = G.current && G.current.spectate;
    var overlay = null;
    if (mode === "menu") {
      overlay = e("div", { className: "overlay" },
        e("div", { className: "ov-title" }, "Pong"),
        e("div", { className: "mode-row" },
          e("button", { className: "mode-tab" + (menuMode === "play" ? " active" : ""), onClick: function () { setMenuMode("play"); } }, "Play"),
          e("button", { className: "mode-tab" + (menuMode === "watch" ? " active" : ""), onClick: function () { setMenuMode("watch"); } }, "Watch AI")
        ),
        menuMode === "play"
          ? e("div", { className: "menu-block" },
              e("div", { className: "ov-sub" }, "First to 7 \u00B7 you're on the bottom"),
              pills(diff, chooseDiff))
          : e("div", { className: "menu-block" },
              e("div", { className: "ov-sub" }, "First to 10 \u00B7 you spectate"),
              e("div", { className: "pick-label" }, "Top side"),
              pills(diffTop, chooseTop),
              e("div", { className: "pick-label" }, "Bottom side"),
              pills(diffBottom, chooseBottom)),
        e("button", { className: "btn-primary", onClick: newGame }, menuMode === "play" ? "Play" : "Watch"),
        menuMode === "play"
          ? e("div", { className: "hint" }, "Drag to move \u00B7 ", e("kbd", null, "\u2190\u2192"), " / ", e("kbd", null, "A D"), " \u00B7 ", e("kbd", null, "Space"), " pause")
          : e("div", { className: "hint" }, "Sit back \u2014 it plays itself")
      );
    } else if (mode === "paused") {
      overlay = e("div", { className: "overlay" },
        e("div", { className: "ov-title" }, "Paused"),
        e("button", { className: "btn-primary", onClick: function () { setMode("playing"); } }, "Resume"),
        e("button", { className: "btn-ghost", onClick: function () { setMode("menu"); } }, "Quit to menu")
      );
    } else if (mode === "over") {
      var title, sub;
      if (spec) {
        var topWon = result === "top";
        title = (topWon ? "Top wins" : "Bottom wins");
        sub = aScore + " \u2013 " + pScore + " \u00B7 " + G.current.topLabel + " vs " + G.current.bottomLabel;
      } else {
        title = result === "win" ? "You win" : "You lose";
        sub = pScore + " \u2013 " + aScore + " \u00B7 " + diff;
      }
      overlay = e("div", { className: "overlay" },
        e("div", { className: "ov-title" + ((spec || result === "win") ? " win" : "") }, title),
        e("div", { className: "ov-sub" }, sub),
        e("button", { className: "btn-primary", onClick: newGame }, spec ? "Watch again" : "Play again"),
        e("button", { className: "btn-ghost", onClick: function () { setMode("menu"); } }, "Menu")
      );
    }

    return e("div", { className: "wrap" },
      e("div", { className: "bar" },
        e("h1", { className: "title" }, "Pong", e("b", null, ".")),
        e("div", { className: "bar-right" },
          (spec && mode !== "menu")
            ? e("span", { className: "tally" }, "AI vs AI")
            : e("span", { className: "tally" }, "W " + stats.wins + " \u00B7 L " + stats.losses),
          mode === "playing" ? e("button", { className: "pill", onClick: function () { setMode("paused"); } }, "Pause") : null
        )
      ),
      e("div", { className: "court-wrap" },
        e("canvas", { ref: canvasRef, className: "court" }),
        overlay
      ),
      e("div", { className: "ver-badge" }, "v" + VERSION)
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(Game));

  if ("serviceWorker" in navigator) {
    var refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (refreshing) return; refreshing = true; window.location.reload();
    });
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").then(function (reg) { reg.update(); }).catch(function () {});
    });
  }
})();
</script>
</body>
</html>
